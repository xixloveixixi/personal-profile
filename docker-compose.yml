version: "3.8"

services:
  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: personal_profile
      MYSQL_USER: pp_app
      MYSQL_PASSWORD: pp_dev_pwd
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BACKEND_DB_DSN: "pp_app:pp_dev_pwd@tcp(mysql:3306)/personal_profile?charset=utf8mb4&parseTime=True&loc=Local"
      JWT_SECRET: dev-secret
      AGENT_SERVICE_URL: http://agent:8000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  agent:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGENT_DB_DSN: "mysql+pymysql://pp_app:pp_dev_pwd@mysql:3306/personal_profile?charset=utf8mb4"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GO_BACKEND_URL: http://backend:8080
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8080
      NEXT_PUBLIC_AGENT_SERVICE_URL: http://agent:8000
    depends_on:
      backend:
        condition: service_started
      agent:
        condition: service_started
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
